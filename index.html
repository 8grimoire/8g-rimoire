<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8G Grimoire</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  color: white;
  background: radial-gradient(circle, #3b0066, #0a0015);
}

/* ✨ BINTANG */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 200%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.4;
  animation: move 100s linear infinite;
}

@keyframes move {
  from { transform: translateY(0); }
  to { transform: translateY(-1000px); }
}

/* 🔮 JUDUL */
h1 {
  margin-top: 15px;
  font-size: 22px;
  text-shadow: 0 0 20px #a855f7;
}

.subtitle {
  font-size: 12px;
  margin-bottom: 10px;
  opacity: 0;
  animation: fade 1.5s forwards;
}

@keyframes fade {
  to { opacity: 1; }
}

/* 📱 GRID */
  .container {
  display: grid;
  grid-template-columns: 1fr; /* 🔥 jadi 1 kolom biar panjang ke bawah */
  gap: 6px;
  padding: 8px;
}
.card {
  border: 1px solid #a855f7;
  background: rgba(0,0,0,0.4);
}
.card {
  padding: 6px;
  font-size: 11px;
  border-radius: 8px;
}

@keyframes masuk {
  to { opacity: 1; transform: translateY(0); }
}

/* 🔮 POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

.popup-content {
  background: #120020;
  padding: 15px;
  border-radius: 10px;
  width: 80%;
}

button {
  margin-top: 10px;
  padding: 8px;
  background: #a855f7;
  border: none;
  color: white;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1>🔮 8G Grimoire 🔮</h1>
<p class="subtitle">The Book of Students</p>

<div class="container" id="list"></div>

<div class="popup" id="popup">
  <div class="popup-content" id="popupContent"></div>
</div>

<script>
const students = [
"Adit Andhika Septiawan","Agny Mai Amirat","Alikha Zifara Maharani","Alman Almaulana Putra",
"Annisa Rania Putri","Arya Ghaussan Ghaillan","Asyifa Eka Faradilla","Ayu Rahmawati",
"Azzahra Nurfiqriyah","Edelweis Alfatihah Nurislami","Fadly Syahbani","Fajar Agya Ilham",
"Fathimah Az-Zahra Irawan","Frans Jerrykho Nababan","Gepin Azka","Giovano Putra Firizqi",
"Ilham Putra Maulana","Jaka Aditya Putra","Kelvin Nugraha","Khairul Rizal",
"Laisya Zakiyatul Muna","Lusy Gustin Adiyansyah","Meysa Azizah",
"Muhamad Daffa Khalihur Rahman","Muhamad Faeyza Anwar","Muhamad Rafka Pratama",
"Muhamad Revan Maulana","Naa'imah Qothrunnadaa","Nayla Almira Pahradia",
"Nur Cinta Oktaviany","Putri Aira Sofwana Ulya","Repan Muhammad Repando",
"Revino Faiq Syauki","Rima Silviana","Rina Rahayu","Selvina Anggraeni",
"Syaakira Kireinisa","Yusbikha Faqih Saputra","Zhilvya Dwina A-Zahra","Zikra Achyar Nurlafi"
];

const hobbies = [
"Gaming 🎮","Membaca 📚","Menggambar 🎨","Nonton 🎬","Musik 🎧",
"Futsal ⚽","Basket 🏀","Ngoding 💻","Scroll TikTok 📱","Fotografi 📸"
];

const dreams = [
"Programmer 💻","Dokter 🏥","Guru 📚","Polisi 🚓","Pilot ✈️",
"Desainer 🎨","YouTuber 🎥","Pengusaha 💼","Atlet 🏆","Artis 🎤"
];

const ages = ["13","14","13-14"];

const list = document.getElementById("list");
const popup = document.getElementById("popup");
const content = document.getElementById("popupContent");

/* RANDOM FUNCTION */
function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/* CREATE CARD */
students.forEach((name, i) => {
  const div = document.createElement("div");
  div.className = "card";
  div.style.animationDelay = i * 0.05 + "s";
  div.innerText = "📖 " + name;

  div.onclick = () => {
    showProfile(name);
  };

  list.appendChild(div);
});

/* POPUP */
function showProfile(name) {
  popup.style.display = "flex";
  content.innerHTML = `
    <h3>${name}</h3>
    <p>🌙 Umur: ${random(ages)}</p>
    <p>🎯 Hobi: ${random(hobbies)}</p>
    <p>✨ Cita-cita: ${random(dreams)}</p>
    <button onclick="closePopup()">Tutup</button>
  `;
}

function closePopup() {
  popup.style.display = "none";
}
  
</script>

</body>
</html>
